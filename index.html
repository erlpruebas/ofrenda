<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofrenda budista de agua</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.181.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <button class="panel-toggle" id="panelToggle" aria-expanded="true" aria-controls="controlsPanel">
        Ocultar menu
      </button>

      <section class="panel" id="controlsPanel" aria-label="Controles de la ofrenda">
        <div>
          <p class="eyebrow">Ofrenda budista virtual</p>
          <h1>Boles de agua</h1>
          <p class="hint" id="instruction">
            Haz clic en la escena para avanzar bol por bol.
          </p>
        </div>

        <div class="control-grid">
          <label>
            Filas
            <input id="rows" type="number" min="1" max="10" value="1" />
          </label>
          <label>
            Boles por fila
            <input id="cols" type="number" min="1" max="20" value="7" />
          </label>
        </div>

        <div class="buttons">
          <button id="modeToggle">Modo: llenar</button>
          <button id="applyLayout">Cambiar boles</button>
          <button id="reset">Reiniciar agua</button>
        </div>

        <div class="progress">
          <span id="status">0 de 7 boles llenos</span>
          <div class="bar"><span id="bar"></span></div>
        </div>

        <div class="steps">
          <strong id="stepTitle">Modo llenar</strong>
          <span id="stepText">Cada clic llena suavemente el siguiente bol.</span>
        </div>

        <p class="camera-help">
          Vista: arrastra para girar, rueda para acercar y clic en la escena para hacer la accion.
        </p>
      </section>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
